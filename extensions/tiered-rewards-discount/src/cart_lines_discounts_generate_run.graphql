query CartInput {
  cart {
    buyerIdentity {
      customer {
        hasAnyTag(tags: ["Canada Shopper", "MD-CAN Shopper"])
      }
    }
    lines {
      id
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            inAnyCollection(ids: ["gid://shopify/Collection/527357477083"])
          }
        }
      }
    }
    cost {
      subtotalAmount {
        amount
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "tiered-rewards", key: "config") {
      value
    }
  }
  enteredDiscountCodes {
    code
  }
}
